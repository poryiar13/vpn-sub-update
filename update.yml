name: Rebuild Xray Balancer Config

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours - just refreshes the server LIST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build config.json
        run: python build_config.py

      - name: Commit and push results
        run: |
          git config user.name "sub-bot"
          git config user.email "sub-bot@users.noreply.github.com"
          git add config.json
          git diff --quiet --cached || git commit -m "Auto-rebuild config.json $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
